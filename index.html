<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Averion — Coming Soon</title>
  <meta name="description"
    content="Averion is launching soon. Technology, logistics, and commerce — executed flawlessly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    /* ── RESET ──────────────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    :root {
      --bg: #02040e;
      --cyan: #00d4ff;
      --blue: #1a5fff;
      --white: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── CURSOR ─────────────────────────────────────── */
    .cursor-dot {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      transform: translate(-50%, -50%);
      transition: width .2s, height .2s;
    }

    .cursor-ring {
      position: fixed;
      z-index: 9998;
      pointer-events: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 212, 255, 0.4);
      transform: translate(-50%, -50%);
      transition: width .35s, height .35s, opacity .35s;
    }

    /* ── ANIMATED BG ────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 40%, rgba(26, 95, 255, 0.16) 0%, transparent 65%),
        radial-gradient(ellipse 40% 35% at 15% 70%, rgba(0, 212, 255, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse 30% 30% at 88% 20%, rgba(26, 95, 255, 0.08) 0%, transparent 55%),
        var(--bg);
    }

    /* Animated grid */
    .grid-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(ellipse 85% 80% at 50% 50%, black 0%, transparent 80%);
      animation: gridScroll 25s linear infinite;
    }

    @keyframes gridScroll {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 72px 72px;
      }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: orbDrift 10s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 480px;
      height: 480px;
      background: rgba(26, 95, 255, 0.12);
      top: -120px;
      left: -80px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 360px;
      height: 360px;
      background: rgba(0, 212, 255, 0.08);
      bottom: -80px;
      right: -60px;
      animation-delay: 4s;
    }

    .orb-3 {
      width: 220px;
      height: 220px;
      background: rgba(26, 95, 255, 0.1);
      top: 55%;
      left: 12%;
      animation-delay: 2s;
    }

    @keyframes orbDrift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(24px, -28px) scale(1.06);
      }
    }

    /* Particle stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(255, 255, 255, 0.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 8%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 72%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 45%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 28% 88%, rgba(255, 255, 255, 0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 30%, rgba(255, 255, 255, 0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 78%, rgba(255, 255, 255, 0.55) 0%, transparent 100%);
    }

    /* ── MAIN CARD ──────────────────────────────────── */
    .card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      max-width: 700px;
      width: 100%;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 44px;
      opacity: 0;
      animation: riseIn 1s .1s forwards;
    }

    .logo-img {
      width: 120px;
      z-index: 2;
      position: relative;
      animation: logoFloat 5s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 24px rgba(0, 212, 255, 0.35));
    }

    @keyframes logoFloat {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-10px);
      }
    }

    .logo-orbit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(0, 212, 255, 0.2);
      animation: spinOrbit 14s linear infinite;
    }

    .logo-orbit::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -5px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan), 0 0 28px rgba(0, 212, 255, 0.6);
      transform: translateY(-50%);
    }

    .logo-orbit-2 {
      position: absolute;
      width: 200px;
      height: 70px;
      border-radius: 50%;
      border: 1px solid rgba(0, 100, 255, 0.15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(72deg);
      animation: spinOrbit 9s linear infinite reverse;
    }

    @keyframes spinOrbit {
      from {
        transform: rotate(0)
      }

      to {
        transform: rotate(360deg)
      }
    }

    /* Headline */
    .coming-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 20px;
      opacity: 0;
      animation: riseIn 1s .3s forwards;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coming-label::before,
    .coming-label::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--cyan));
    }

    .coming-label::after {
      background: linear-gradient(to left, transparent, var(--cyan));
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.6rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #ffffff 0%, #a8d8ff 40%, var(--cyan) 70%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      opacity: 0;
      animation: riseIn 1s .5s forwards;
    }

    .tagline {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.04em;
      max-width: 420px;
      line-height: 1.75;
      margin-bottom: 56px;
      opacity: 0;
      animation: riseIn 1s .7s forwards;
    }

    /* ── COUNTDOWN ──────────────────────────────────── */
    .countdown {
      display: flex;
      gap: 24px;
      margin-bottom: 56px;
      opacity: 0;
      animation: riseIn 1s .85s forwards;
    }

    .count-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .count-number {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 70px;
      text-align: center;
      line-height: 1;
    }

    .count-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    .count-divider {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: rgba(0, 212, 255, 0.25);
      align-self: center;
      margin-top: -12px;
    }

    /* ── EMAIL FORM ─────────────────────────────────── */
    .notify-form {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 420px;
      opacity: 0;
      animation: riseIn 1s 1s forwards;
    }

    .notify-input {
      flex: 1;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-right: none;
      border-radius: 100px 0 0 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      color: #fff;
      outline: none;
      transition: border-color .3s, background .3s;
    }

    .notify-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .notify-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .notify-btn {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border: none;
      border-radius: 0 100px 100px 0;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      cursor: none;
      white-space: nowrap;
      transition: box-shadow .3s, transform .2s;
      box-shadow: 0 0 24px rgba(0, 150, 255, 0.3);
    }

    .notify-btn:hover {
      box-shadow: 0 0 48px rgba(0, 200, 255, 0.45);
    }

    /* Success state */
    .notify-success {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--cyan);
      opacity: 0;
      animation: riseIn .5s forwards;
    }

    .notify-success.show {
      display: flex;
    }

    /* ── SOCIAL LINKS ───────────────────────────────── */
    .social-row {
      display: flex;
      gap: 20px;
      margin-top: 50px;
      opacity: 0;
      animation: riseIn 1s 1.15s forwards;
    }

    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 0.85rem;
      transition: border-color .3s, color .3s, box-shadow .3s;
      cursor: none;
    }

    .social-link svg {
      display: block;
      margin: auto;
    }

    .social-link:hover {
      border-color: rgba(0, 212, 255, 0.5);
      color: var(--cyan);
      box-shadow: 0 0 18px rgba(0, 212, 255, 0.2);
    }

    /* ── BOTTOM BRAND ───────────────────────────────── */
    .brand-footer {
      position: fixed;
      bottom: 28px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 2;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.18);
      opacity: 0;
      animation: riseIn 1s 1.3s forwards;
    }

    /* ── ANIMATIONS ─────────────────────────────────── */
    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 520px) {
      .countdown {
        gap: 12px;
      }

      .count-number {
        font-size: 1.8rem;
        min-width: 52px;
      }

      .notify-form {
        flex-direction: column;
      }

      .notify-input {
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: none;
        border-radius: 100px;
      }

      .notify-btn {
        border-radius: 100px;
      }

      html,
      body {
        overflow-y: auto;
      }
    }
  </style>
</head>

  <script>
    // ── CURSOR ──────────────────────────────────────
    const dot = document.getElementById('cDot');
    const ring = document.getElementById('cRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
    (function loop() { rx += (mx - rx) * .12; ry += (my - ry) * .12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(loop) })();
    document.addEventListener('mouseover', e => {
      const h = e.target.closest('a,button,input');
      ring.style.width = h ? '52px' : '34px'; ring.style.height = h ? '52px' : '34px'; ring.style.opacity = h ? '0.5' : '1';
    });


    // ── PERMANENT COUNTDOWN ──
    // Set your specific launch date here (Format: YYYY-MM-DDTHH:mm:ss)
    // This date is now universal for all users.
    const launchDate = new Date('2026-07-01T00:00:00');

    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;

      if (diff <= 0) {
        const cdElement = document.getElementById('countdown');
        if (cdElement) cdElement.style.display = 'none';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      // Update DOM only if elements exist to prevent errors
      const elements = {
        'cd-days': d,
        'cd-hours': h,
        'cd-mins': m,
        'cd-secs': s
      };

      for (const [id, value] of Object.entries(elements)) {
        const el = document.getElementById(id);
        if (el) el.textContent = String(value).padStart(2, '0');
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
    // ── NOTIFY FORM ──────────────────────────────────
    async function handleNotify() {
      const emailInput = document.getElementById('emailInput');
      const email = emailInput.value.trim();

      // 1. Validation
      if (!email || !email.includes('@')) {
        emailInput.style.borderColor = 'rgba(255,80,80,0.5)';
        setTimeout(() => emailInput.style.borderColor = '', 1500);
        return;
      }

      // 2. Visual Feedback (Optional: disable input while sending)
      emailInput.disabled = true;
      emailInput.style.opacity = '0.5';

      try {
        // 3. Send data to Formspree
        const response = await fetch('https://formspree.io/f/xvzdwyla', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            message: "New subscriber from Averion Launch Page"
          })
        });

        if (response.ok) {
          // 4. Success UI
          document.getElementById('notifyForm').style.display = 'none';
          const success = document.getElementById('notifySuccess');
          success.classList.add('show');
        } else {
          // 5. Error handling
          alert("Submission failed. Please try again.");
          emailInput.disabled = false;
          emailInput.style.opacity = '1';
        }
      } catch (error) {
        alert("Network error. Please check your connection.");
        emailInput.disabled = false;
        emailInput.style.opacity = '1';
      }
    }

    // Keep your existing Enter key listener
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleNotify();
    });
  </script>
</body>

</html>
